<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GREBESHKI App</title>
    <style>
        :root {
            --ios-bg: #ffffff;
            --ios-gray: #f2f2f7;
            --ios-blue: #007AFF;
            --black: #000000;
            --text-gray: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .iphone-frame {
            width: 375px;
            height: 812px;
            background: var(--ios-bg);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 10px #1f1f1f, 0 20px 50px rgba(0,0,0,0.5);
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active { display: flex; }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin-top: 80px;
            text-transform: uppercase;
        }

        .auth-content { padding: 40px 30px; }

        input, select {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            background: var(--ios-gray);
            font-size: 16px;
        }

        .btn-black {
            width: 100%;
            background: var(--black);
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .nav-bar {
            padding: 60px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
        }

        .bubble.me {
            background: var(--black);
            color: white;
            align-self: flex-end;
        }

        .bubble.other {
            background: var(--ios-gray);
            align-self: flex-start;
        }

        .chat-input-bar {
            padding: 15px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="iphone-frame">

    <div id="login" class="screen active">
        <div class="logo-text">GREBESHKI</div>
        <div class="auth-content">
            <input type="text" id="nameInput" placeholder="Имя и Фамилия">
            <select id="roleSelect">
                <option value="Организатор">Организатор</option>
                <option value="Администратор">Администратор</option>
                <option value="Бармен">Бармен</option>
                <option value="Участник">Участник</option>
            </select>
            <button class="btn-black" onclick="doLogin()">Войти</button>
        </div>
    </div>

    <div id="calendar" class="screen">
        <div class="nav-bar">
            <span>GREBESHKI</span>
            <button onclick="addEvent()">+</button>
        </div>
        <div id="eventList"></div>
    </div>

    <div id="chat" class="screen">
        <div class="nav-bar">
            <button onclick="goBack()">← Назад</button>
            <b id="eventTitle">Чат</b>
        </div>
        <div class="chat-container" id="messages"></div>
        <div class="chat-input-bar">
            <input type="text" id="msgInput">
            <button onclick="sendMsg()">OK</button>
        </div>
    </div>

</div>

<script>
    let userData = { name: "", role: "" };
    let events = [{ id: 1, title: "Дегустация вина", desc: "Пробуем новые позиции" }];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function doLogin() {
        userData.name = document.getElementById('nameInput').value;
        if(!userData.name) { alert("Введите имя!"); return; }
        renderEvents();
        showScreen('calendar');
    }

    function renderEvents() {
        const list = document.getElementById('eventList');
        list.innerHTML = '';
        events.forEach(e => {
            const div = document.createElement('div');
            div.className = 'event-item';
            div.innerHTML = e.title;
            div.onclick = () => openChat(e.title);
            list.appendChild(div);
        });
    }

    function openChat(title) {
        document.getElementById('eventTitle').innerText = title;
        showScreen('chat');
    }

    function goBack() { showScreen('calendar'); }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value) return;
        const chat = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'bubble me';
        div.innerText = input.value;
        chat.appendChild(div);
        input.value = '';
    }

    function addEvent() {
        const title = prompt("Название события:");
        if(title) {
            events.push({ id: Date.now(), title });
            renderEvents();
        }
    }
</script>

</body>
</html>
