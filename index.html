<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Шеф-повар</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        #video { width: 100%; max-width: 400px; border-radius: 15px; background: #000; }
        #canvas { display: none; }
        .controls { margin-top: 20px; }
        button { padding: 15px 25px; font-size: 16px; border-radius: 50px; border: none; background: #28a745; color: white; cursor: pointer; }
        #recipe-output { margin-top: 30px; text-align: left; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .loader { display: none; color: #555; }
    </style>
</head>
<body>

    <h1>📸 AI Рецепты</h1>
    <p>Наведи камеру на продукты в холодильнике</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="capture">Узнать рецепт!</button>
    </div>

    <div class="loader" id="loader">Нейросеть изучает продукты... 🍳</div>

    <div id="recipe-output">
        <h2 id="recipe-title"></h2>
        <div id="recipe-content"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture');
        const recipeOutput = document.getElementById('recipe-output');
        const loader = document.getElementById('loader');

        // Включаем камеру
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                alert("Ошибка доступа к камере: " + err);
            }
        }

        captureBtn.addEventListener('click', async () => {
            // Рисуем кадр на скрытый холст
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Получаем base64 изображения
            const imageData = canvas.toDataURL('image/jpeg');

            // Показываем загрузку
            loader.style.display = 'block';
            recipeOutput.style.display = 'none';

            // Здесь должен быть вызов вашего API
            // Для примера имитируем запрос к AI
            getRecipeFromAI(imageData);
        });

        async function getRecipeFromAI(image) {
            /* ЛОГИКА: 
               1. Отправляем image на сервер или напрямую в Gemini API / OpenAI API.
               2. Промпт: "Посмотри на это фото еды и предложи 1 быстрый рецепт".
            */
            
            setTimeout(() => { // Имитация задержки сети
                loader.style.display = 'none';
                recipeOutput.style.display = 'block';
                document.getElementById('recipe-title').innerText = "Омлет с овощами";
                document.getElementById('recipe-content').innerHTML = `
                    <p><strong>Продукты на фото:</strong> Яйца, перец, зелень.</p>
                    <p><strong>Инструкция:</strong> Взбейте яйца, нарежьте перец кубиками и обжарьте 3 минуты...</p>
                `;
            }, 2000);
        }

        initCamera();
    </script>
</body>
</html>
